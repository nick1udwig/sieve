name: release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    outputs:
      created: ${{ steps.meta.outputs.created }}
      sha: ${{ steps.meta.outputs.sha }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends bubblewrap ffmpeg libssl-dev pkg-config strace

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-workspace
          cache-directories: |
            ~/.cargo/bin

      - name: Compute release version
        id: version
        run: |
          if [[ "${{ github.event.head_commit.message }}" == chore\(release\):\ bump\ version\ to\ * ]]; then
            version="$(scripts/bump-version.sh --current)"
            bumped=false
          else
            version="$(scripts/bump-version.sh --write)"
            bumped=true
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "bumped=${bumped}" >> "${GITHUB_OUTPUT}"

      - name: Check version sync
        run: scripts/bump-version.sh --check

      - name: Check pinned git dependencies
        run: scripts/check-git-deps.sh

      - name: Check release workflow
        run: scripts/test-release-workflow.sh

      - name: Check Docker runtime image
        run: scripts/test-docker-runtime-image.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Typecheck workspace
        run: cargo check --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/sieve-tool-contracts/Cargo.toml crates/sieve-tool-contracts/Cargo.lock
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:master

      - name: Capture build metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

  build-image:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: release-bundle-v1-${{ matrix.arch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-bundle-${{ matrix.arch }}

      - name: Install sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Zero sccache stats
        run: sccache --zero-stats || true

      - name: Build release bundle
        run: scripts/build-release-bundle.sh --arch "${{ matrix.arch }}" --out-dir dist/release

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=release-image-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-image-${{ matrix.arch }}
          tags: |
            nick1udwig/sieve:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}
            nick1udwig/sieve:latest-${{ matrix.arch }}
          build-args: |
            SIEVE_VERSION=${{ needs.prepare.outputs.version }}
            VCS_REF=${{ needs.prepare.outputs.sha }}
            BUILD_DATE=${{ needs.prepare.outputs.created }}

  publish-manifest:
    needs:
      - prepare
      - build-image
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish version manifest
        run: docker buildx imagetools create -t nick1udwig/sieve:${{ needs.prepare.outputs.version }} nick1udwig/sieve:${{ needs.prepare.outputs.version }}-amd64 nick1udwig/sieve:${{ needs.prepare.outputs.version }}-arm64

      - name: Publish latest manifest
        run: docker buildx imagetools create -t nick1udwig/sieve:latest nick1udwig/sieve:latest-amd64 nick1udwig/sieve:latest-arm64

      - name: Inspect published manifest
        run: docker buildx imagetools inspect nick1udwig/sieve:${{ needs.prepare.outputs.version }}
