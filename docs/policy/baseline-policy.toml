# Sieve v3 baseline MVP policy.
# Conservative default:
# - blocks `trash` unless user approves once
# - denies unsupported mutating/network actions unless explicitly allowed

[[deny_rules]]
id = "deny-trash"
argv_prefix = ["trash"]
decision = "deny_with_approval"
reason = "trash requires explicit approval"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://api.search.brave.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://markdown.new/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://weather.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://www.weather.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://forecast.weather.gov/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://wunderground.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://www.wunderground.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://google.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://www.google.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://x.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://www.x.com/"

[[allow_capabilities]]
resource = "net"
action = "connect"
scope = "https://api.open-meteo.com/"

[options]
violation_mode = "ask"
require_trusted_control_for_mutating = true
trusted_control = true
